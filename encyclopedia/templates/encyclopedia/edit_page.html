{% extends "encyclopedia/layout.html" %}

{% block title %}
    Edit page
{% endblock %}

{% block body %}
    <h1>Edit {{ title }}</h1>
    <div class="form">
        <form action="{% url 'edit_page' title=title %}" method="post">
            {% csrf_token %}
            <textarea class="title" rows="10" cols="10" name="title" placeholder="Title of the new page">{{ title }}</textarea>
            <br>
            <textarea class="content" rows ="10" cols="10" name="content" placeholder="Content of the new page">{{ content }}</textarea>
            <br>
            <input type="submit" class="submit-new" value="Update">
        </form>
    </div>
{% endblock %}
