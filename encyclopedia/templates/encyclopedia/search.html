{% extends "encyclopedia/layout.html" %}

{% block title %}
    Matching Results
{% endblock %}

{% block body %}
    <h1>Matching Results for {{ query }}</h1>

    <ul>
        {% for entry in matches %}
        <li><a href="{% url 'entry' title=entry %}">{{ entry }}</a></li>
        {% endfor %}
    </ul>

{% endblock %}
