<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="center">
            <a href="index.html" class="image-link">Search</a>
            <form id="text-box" action="https://www.google.com/search" method="get">

        </div>
    </body>
</html>
