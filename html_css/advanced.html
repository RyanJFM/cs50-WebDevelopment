<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h2 id="move-a-bit">Advanced Search</h2>
        <h3 id="move-a-bit">Find pages with</h3>
        <div class="top-right">
            <a href="index.html" class="image-link">Search</a>
            <form action="https://www.google.com/search">
                <input class="small-box" type="text" name="as_q" placeholder="All these words">
                <br>
                <input class="small-box" type="text" name="as_epq" placeholder="This exact word or phrase">
                <br>
                <input class="small-box" type="text" name="as_oq" placeholder="Any of these words">
                <br>
                <input class="small-box" type="text" name="as_eq" placeholder="None of these words">
                <br>
                <input class="small-box" type="submit" value="Advanced Search">
            </form>
        </div>
    </body>
</html>
