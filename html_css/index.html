<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Search</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="center">
            <a href="image.html" class="image-link">Image search</a>
            <a href="advanced.html" class="advanced-link">Advanced search</a>
            <form id="text-box" action="https://www.google.com/search" method="get">
                <img class="logo" src="images.png">
                <br>
                <input type="text" name="q" class="text-box">
                <br>
                <input class="google-button" type="submit" value="Google Search">
                <input class="lucky-button" type="submit" name="btnI" value="I'm Feeling Lucky">
            </form>
        </div>
    </body>
</html>
